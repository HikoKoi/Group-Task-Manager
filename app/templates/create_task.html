{% extends "base.html" %}

{% block title %}Tạo Công Việc - GTM{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="glass-panel p-4 p-sm-5">
            <div class="d-flex align-items-center gap-3 mb-4">
                <a href="{{ url_for('groups.inside_group', group_id=group.group_id) }}" class="btn btn-sm btn-glass">
                    <i class="bi bi-chevron-left"></i> Quay lại
                </a>
                <div>
                    <h2 class="h3 fw-bold text-light mb-0">Tạo Công Việc Mới</h2>
                    <p class="text-secondary small mb-0">Nhóm: <span class="text-info">{{ group.group_name }}</span></p>
                </div>
            </div>

            {% if error %}
            <div class="alert alert-danger bg-danger bg-opacity-10 border-danger border-opacity-20 text-danger small" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
            </div>
            {% endif %}

            <form action="{{ url_for('tasks.create_task', group_id=group.group_id) }}" method="POST">
                <div class="mb-3">
                    <label class="form-label text-secondary small">Tiêu đề công việc <span class="text-danger">*</span></label>
                    <input type="text" name="title" class="form-control form-control-glass" placeholder="Nhập tên/tiêu đề công việc..." required>
                </div>

                <div class="mb-3">
                    <label class="form-label text-secondary small">Mô tả công việc</label>
                    <textarea name="description" rows="4" class="form-control form-control-glass" placeholder="Mô tả chi tiết nội dung công việc..."></textarea>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label text-secondary small">Ngày bắt đầu</label>
                        <input type="date" name="startDate" class="form-control form-control-glass">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-secondary small">Hạn chót <span class="text-danger">*</span></label>
                        <input type="date" name="deadline" class="form-control form-control-glass" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label text-secondary small">Độ ưu tiên</label>
                    <select class="form-select form-control-glass" name="priority">
                        <option value="low">Thấp</option>
                        <option value="medium" selected>Trung bình</option>
                        <option value="high">Cao</option>
                    </select>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <label class="form-label text-secondary small mb-0">Phân công thành viên <span class="text-danger">*</span></label>
                        <button type="button" class="btn btn-sm btn-glass text-info py-1 px-2.5" id="btnSelectAll" onclick="toggleSelectAllBtn()">
                            <i class="bi bi-check2-all me-1"></i>Chọn tất cả
                        </button>
                    </div>
                    <div class="p-3 bg-dark bg-opacity-40 border border-glass rounded-3" style="max-height: 200px; overflow-y: auto;">
                        {% for member in members %}
                        <div class="form-check mb-2">
                            <input class="form-check-input member-checkbox" type="checkbox" name="assignedUsers" value="{{ member.user_id }}" id="member_{{ member.user_id }}">
                            <label class="form-check-label text-secondary" for="member_{{ member.user_id }}">
                                {{ member.full_name or member.username }} (@{{ member.username }})
                            </label>
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <button type="submit" class="btn btn-gradient w-100 py-2.5">
                    <i class="bi bi-plus-lg me-2"></i>Tạo công việc
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function toggleSelectAllBtn() {
    var checkboxes = document.getElementsByClassName('member-checkbox');
    for (var i = 0; i < checkboxes.length; i++) {
        checkboxes[i].checked = true;
    }
}
</script>
{% endblock %}
